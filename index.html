    <script>
        window.addOutsideClickListener = (dotNetObj, menuId, buttonId, callbackMethod) => {
            const clickHandler = (event) => {
                const menuElement = document.getElementById(menuId);
                const buttonElement = document.getElementById(buttonId);

                // Check if click is outside both the menu and button
                if (
                    menuElement && !menuElement.contains(event.target) &&
                    buttonElement && !buttonElement.contains(event.target)
                ) {
                    dotNetObj.invokeMethodAsync(callbackMethod);
                }
            };

            // Attach the event listener
            document.addEventListener('click', clickHandler);

            // Return a cleanup function to remove the event listener if needed
            return {
                remove: () => document.removeEventListener('click', clickHandler)
            };
        };
    </script>



    <script>
        window.toggleDarkMode = () => {

        document.addEventListener("DOMContentLoaded", () => {

        });

    <script>
        function setupProfileDropdown() {
            document.addEventListener('click', function (e) {
                const dropdown = document.querySelector('.profile-info .dropdown-menu');
                const isDropdownButton = e.target.matches('.profile-info, .profile-info *');
                if (isDropdownButton) {
                    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
                } else {
                    dropdown.style.display = 'none';
                }
            });
        }

        window.toggleMobileMenu = function () {

            sidebar.classList.toggle("show");
        }

        // Close menu if clicking outside the sidebar
        document.addEventListener("click", function (event) {
            const sidebar = document.getElementById("mobileSidebar");
            const toggleButton = document.querySelector(".mobile-menu-toggle");

            if (sidebar && !sidebar.contains(event.target) && toggleButton && !toggleButton.contains(event.target)) {

            }
        });

    <script>
        function shareOnSocialMedia(platform, url, description) {
            let shareUrl;
            switch (platform) {
                case "facebook":
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
                    break;
                case "twitter":
                    shareUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(description)}`;
                    break;
                case "linkedin":
                    shareUrl = `https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}&title=${encodeURIComponent(description)}`;
                    break;
            }
            window.open(shareUrl, "_blank");
        }


    </script>

    <script type="text/javascript">
        function printableDiv(divName, callback) {
            var printContents = document.getElementById(divName).innerHTML;
            var originalContents = document.body.innerHTML;

            // Temporarily replace the content of the body with the printable div
            document.body.innerHTML = printContents;

            // Trigger the print dialog
            window.print();
            window.location.reload();
            // After printing, restore the original content of the page
            setTimeout(function () {
                document.body.innerHTML = originalContents;
                // Call the Blazor callback method after printing
                callback.invokeMethodAsync("OnPrintCompleted");
            }, 1000);  // Adjust the delay time as needed
        }
    </script>
